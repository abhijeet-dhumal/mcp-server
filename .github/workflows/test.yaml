name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (trainer)
        run: uv sync --extra dev --extra trainer

      - name: Run tests
        run: uv run pytest --cov=kubeflow_mcp --cov-report=xml

  test-extras:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extra: [optimizer, hub]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install ${{ matrix.extra }} extra
        run: uv sync --extra dev --extra ${{ matrix.extra }}

      - name: Smoke-test import
        run: uv run python -c "import kubeflow_mcp"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
